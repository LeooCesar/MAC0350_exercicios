<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuários</title>
</head>
<body>
    <h1>Criar Nova Conta</h1>
    
    <form>
        <label>Nome:</label><br>
        <input type="text" id="nome" placeholder="Digite seu nome"><br><br>

        <label>Bio:</label><br>
        <input type="text" id="bio" placeholder="Fale sobre você"><br><br>

        <label>Senha:</label><br>
        <input type="password" id="senha" placeholder="Crie uma senha"><br><br>

        <button type="button" onclick="criarUsuario()">Cadastrar via JS</button>
    </form>

    <script>
        async function criarUsuario() {
            const dados = {
                nome: document.getElementById('nome').value,
                bio: document.getElementById('bio').value,
                senha: document.getElementById('senha').value
            };

            const resposta = await fetch('/users', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dados)
            });

        if(resposta.ok){
            const resultado = await resposta.json();
            alert(resultado.mensagem);
        }
        else{
            alert("Deu algum erro na hora de enviar!");
        }
        }
    </script>
</body>
</html>
